services:
  mongodb:
    image: mongo:8.0
    container_name: arquitetura-node-typescript-mongo
    restart: unless-stopped
    ports:
      - '127.0.0.1:27017:27017'
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  app:
    build: .
    container_name: arquitetura-node-typescript-app
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - '3000:3000'
    environment:
      PORT: 3000
      TARGET: docker
      MONGO_DB_URL: mongodb://mongodb:27017/arquitetura-node-typescript
    healthcheck:
      test: node -e "fetch('http://localhost:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  mongodb_data:
